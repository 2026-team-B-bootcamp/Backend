name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
  # deploy.yml이 배포 직전 게이트로 이 워크플로를 그대로 재사용한다
  # (jobs.ci.uses: ./.github/workflows/ci.yml). lint/test 정의를 한 곳에만 둔다.
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --frozen

      - run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    services:
      # 테스트는 실제 Postgres(pgvector)를 쓴다 — tag_embeddings의 vector
      # 타입/코사인 연산이 SQLite로는 안 되기 때문 (tests/conftest.py 참고).
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bootcamp
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: bootcamp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bootcamp -d bootcamp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://bootcamp:changeme@localhost:5432/bootcamp_test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync --frozen

      - run: uv run pytest -q
