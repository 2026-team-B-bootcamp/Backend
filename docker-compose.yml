services:
  db:
    # postgres:16 + pgvector extension 포함 이미지. 데이터 포맷은 PG16 그대로라
    # 기존 pgdata 볼륨을 그대로 쓴다. extension 활성화(CREATE EXTENSION)는
    # alembic 마이그레이션이 담당한다.
    # -trixie 고정 이유: 볼륨을 초기화한 기존 postgres:16이 trixie(glibc 2.41)
    # 기반이라, bookworm 기반 기본 태그를 쓰면 collation 버전 불일치로
    # CREATE DATABASE가 실패한다.
    image: pgvector/pgvector:pg16-trixie
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    # 이미지 CMD/ENTRYPOINT는 프로덕션용(마이그레이션 후 --reload 없이 실행)으로
    # 바뀌었다. 개발에서는 bind-mount(./:/app) + 핫 리로드가 동작해야 하므로
    # 여기서 command로 개발 서버(uvicorn --reload)를 덮어써 엔트리포인트를 우회한다.
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--reload"]
    # 프로덕션 이미지는 비-root(appuser)로 실행되지만, 개발에서는 bind-mount 된
    # 호스트 폴더(./)에 자유롭게 쓸 수 있어야 하므로(예: static/avatars 생성)
    # 기존처럼 root로 되돌린다. .pyc는 이미지 ENV PYTHONDONTWRITEBYTECODE로 억제된다.
    user: root
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    environment:
      # DB 접속 문자열. "db"는 compose 서비스 이름을 호스트명으로 사용한 것이다.
      # 아직 코드에서 실제로 쓰지는 않고, 나중에 DB 연동을 붙일 때를 위해
      # 미리 정해둔 값이다.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # pub/sub·게임 세션·AI 캐시가 쓰는 Redis. "redis"는 compose 서비스 이름이다.
      REDIS_URL: redis://redis:6379/0
      # Windows(WSL2)에서 윈도우 파일시스템을 bind-mount 하면 파일 변경 감지
      # (inotify)가 불안정한 경우가 많다. 폴링 방식으로 강제 전환해
      # uvicorn --reload 핫 리로드가 항상 동작하도록 한다.
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      - db
      - redis

volumes:
  pgdata:
