# 프로덕션 스택. 개발용 docker-compose.yml과 분리한다.
#
# 핵심 차이점:
#  - bind-mount·핫 리로드 없음. 소스는 이미지에 구워진 채로 실행된다(Dockerfile).
#  - db·redis는 호스트 포트를 열지 않는다(내부 네트워크로만 접근). pgadmin 제외.
#  - api도 호스트 포트를 열지 않는다 — 외부 노출은 caddy(80/443)뿐이다.
#  - 모든 서비스 restart: unless-stopped.
#  - 시크릿·접속정보는 EC2의 /opt/ieum/.env(600 권한, 커밋 금지)에서 온다.
#    compose가 같은 디렉터리의 .env를 자동으로 읽어 ${...}를 채운다.
#    필요한 키 전체 목록은 DEPLOY.md 참고.
services:
  db:
    # 개발과 동일한 pgvector 포함 PG16 이미지. extension·테이블은 alembic이 만든다.
    image: pgvector/pgvector:pg16-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # 호스트 포트 매핑 없음 — compose 내부 네트워크(api만 접근)로만 노출한다.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF 영속화 — 재시작 시 pub/sub 외 게임 세션·캐시 데이터가 유지된다.
    command: ["redis-server", "--appendonly", "yes"]
    # 호스트 포트 매핑 없음 — 내부 네트워크로만 접근한다.
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    # image와 build를 함께 둔다:
    #  - CD(GitHub Actions)는 GHCR에 밀어둔 이미지를 IMAGE_TAG로 pull 한다.
    #    `docker compose pull api && docker compose up -d` → EC2에서 빌드 안 함.
    #  - 최초 수동 배포나 GHCR을 못 쓸 때는 `up -d --build`로 로컬 빌드한다.
    #    이 경우 빌드 결과가 아래 image 이름으로 태깅돼 그대로 뜬다.
    # IMAGE_TAG를 sha-<커밋>으로 주면 그 커밋으로 즉시 롤백된다(DEPLOY.md 8절).
    image: ${API_IMAGE:-ghcr.io/2026-team-b-bootcamp/backend}:${IMAGE_TAG:-latest}
    build: .
    restart: unless-stopped
    # 호스트 포트 매핑 없음 — caddy 뒤로 숨긴다. 평문 8000은 외부에 열리지 않는다.
    expose:
      - "8000"
    environment:
      # 접속정보·시크릿은 /opt/ieum/.env가 주입한다(커밋된 값 아님).
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # 허용할 프론트 출처(쉼표 구분 https 목록). 비어 있으면 localhost 폴백이라
      # 프로덕션에서는 반드시 실제 도메인을 지정한다.
      CORS_ORIGINS: ${CORS_ORIGINS}
      # 슬랙 봇. 두 값이 다 있어야 app/main.py가 /slack/* 라우터를 등록한다 —
      # 비워두면 슬랙 기능만 꺼지고 나머지 서비스는 그대로 뜬다.
      # 프로덕션 이미지에는 .env가 들어있지 않으므로(.dockerignore) 여기 나열된
      # 것만 컨테이너에 전달된다. .env에 넣는 것만으로는 앱에 닿지 않는다.
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      # 봇이 발급하는 입장 링크의 기준(프론트 주소).
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL}
    volumes:
      # 업로드된 아바타(app/services/user_service.py가 static/avatars에 저장)를
      # 이미지 밖 볼륨에 보존한다. 없으면 재배포마다 프로필 이미지가 전부 사라진다.
      - avatars:/app/static/avatars
    healthcheck:
      # 마이그레이션 실패·기동 실패를 compose가 인지하게 한다. 이미지에 curl이
      # 없으므로(python:3.12-slim) 파이썬 표준 라이브러리로 때린다.
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      # alembic upgrade head가 끝날 때까지의 여유. 이 구간의 실패는 카운트되지 않는다.
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    # TLS 종단 + 리버스 프록시. Let's Encrypt 인증서를 자동 발급·갱신한다.
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80" # HTTP-01 챌린지 + HTTPS 리다이렉트
      - "443:443" # HTTPS / WSS
    environment:
      # Caddyfile의 {$...} 자리를 채운다. 예: ieum.duckdns.org
      SITE_ADDRESS: ${SITE_ADDRESS}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data # 발급받은 인증서 — 반드시 영속화한다
      - caddyconfig:/config
      - caddylogs:/var/log/caddy
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  avatars: # 업로드 아바타 — 재배포에도 살아남아야 한다
  caddydata: # 인증서 — 빼먹으면 배포마다 재발급 → Let's Encrypt 한도 초과
  caddyconfig:
  caddylogs:
